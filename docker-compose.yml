services:
  postgres:
    image: postgres:16-alpine
    container_name: inboxflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: inboxflow
      POSTGRES_PASSWORD: inboxflow
      POSTGRES_DB: inboxflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inboxflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: inboxflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: inboxflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: inboxflow-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: inboxflow-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - full

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: inboxflow-worker
    restart: unless-stopped
    command: ["node", "dist/workers/index.js"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - full

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: inboxflow-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    profiles:
      - full

volumes:
  postgres_data:
  redis_data:
  minio_data:
