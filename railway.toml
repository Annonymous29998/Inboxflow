# Default config for @inboxflow/api on Railway.
# In the web service settings, override or delete that service (host web on Vercel).

[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build -w @inboxflow/api"

[deploy]
startCommand = "npm run start -w @inboxflow/api"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
